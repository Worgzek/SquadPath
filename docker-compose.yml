version: '3.8'
 
x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
    - ./plugins:/opt/airflow/plugins
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  env_file:
    - .env
 
services:
  postgres:
    image: postgres:15
    container_name: itcareerlab_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
 
  airflow-init:
    <<: *airflow-common
    container_name: itcareerlab_airflow_init
    command: db init
    restart: on-failure
 
  airflow-webserver:
    <<: *airflow-common
    container_name: itcareerlab_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always
 
  airflow-scheduler:
    <<: *airflow-common
    container_name: itcareerlab_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always
 
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: itcareerlab_fastapi
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./api:/app
    restart: always
 
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: itcareerlab_frontend
    ports:
      - "5000:5000"
    depends_on:
      - fastapi
    env_file:
      - .env
    volumes:
      - ./frontend:/app
    restart: always
 
volumes:
  postgres_data:
  logs: